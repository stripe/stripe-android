apply from: configs.androidApplication

apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
apply plugin: "org.jetbrains.kotlin.plugin.parcelize"
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

android {
    namespace 'com.stripe.tta.demo'

    defaultConfig {
        applicationId "com.stripe.tta.demo"
        minSdk 26
        versionCode 11

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        compose true
    }
}

dependencies {
    implementation project(':payments')

    implementation libs.androidx.activity
    implementation libs.androidx.appCompat
    implementation libs.androidx.coreKtx
    implementation libs.androidx.liveDataKtx
    implementation libs.androidx.navigationUi
    implementation libs.androidx.viewModel
    implementation libs.compose.activity
    implementation libs.compose.foundation
    implementation libs.compose.liveData
    implementation libs.compose.material
    implementation libs.compose.navigation
    implementation libs.compose.ui
    implementation libs.compose.uiTooling
    implementation libs.compose.viewModels
    implementation libs.fuel
    implementation libs.fuelCoroutines
    implementation libs.kotlin.serialization
    implementation libs.terminal.core
    implementation libs.terminal.tapToPay
}