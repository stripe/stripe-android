import org.jetbrains.kotlin.gradle.dsl.JvmTarget

ext.useKotlinMultiplatformAndroid = true

apply from: configs.androidLibrary

apply plugin: 'org.jetbrains.kotlin.multiplatform'

apply plugin: 'com.google.devtools.ksp'
apply plugin: 'checkstyle'
apply plugin: 'org.jetbrains.kotlin.plugin.parcelize'
apply plugin: 'kotlinx-serialization'

ext {
    artifactId = "stripe-core"
    artifactName = "stripe-core"
    artifactDescrption = "The core module of Stripe Android SDKs"
}

android {
    buildFeatures {
        buildConfig = true
    }
}

kotlin {
    androidTarget {
        compilerOptions {
            jvmTarget.set(JvmTarget.JVM_11)
            freeCompilerArgs.addAll([
                    "-Xconsistent-data-class-copy-visibility",
                    "-P",
                    "plugin:org.jetbrains.kotlin.parcelize:additionalAnnotation=com.stripe.android.core.model.CommonParcelize"
            ])
        }
    }

    sourceSets {
        commonMain.dependencies {
            api libs.okio
            implementation libs.androidx.annotation
            implementation libs.kotlin.coroutines
            implementation libs.kotlin.ioOkio
            implementation libs.ktor.clientCore
            api libs.kotlin.serialization
        }
        commonTest

        androidMain.dependencies {
            implementation libs.androidx.browser
            implementation libs.dagger
            implementation libs.kotlin.coroutines
            implementation libs.kotlin.coroutinesAndroid
            implementation libs.kotlin.serialization
            implementation libs.ktor.clientOkhttp
            implementation libs.androidx.activity
            implementation libs.androidx.viewModel
            implementation libs.androidx.savedState

            compileOnly libs.androidx.workManager
        }

        androidUnitTest.dependencies {
            implementation project(':network-testing')
            implementation testLibs.androidx.archCore
            implementation testLibs.androidx.core
            implementation testLibs.androidx.fragment
            implementation testLibs.androidx.testRunner
            implementation testLibs.androidx.workManager
            implementation testLibs.json
            implementation testLibs.junit
            implementation testLibs.kotlin.annotations
            implementation testLibs.kotlin.coroutines
            implementation testLibs.kotlin.junit
            implementation testLibs.mockito.core
            implementation testLibs.mockito.kotlin
            implementation testLibs.okhttpKtorMockWebServer
            implementation testLibs.robolectric
            implementation testLibs.truth
        }
    }
}

dependencies {
    add("kspAndroid", libs.daggerCompiler)
}

apply from: "${rootDir}/deploy/deploy.gradle"
