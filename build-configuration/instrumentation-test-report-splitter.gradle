import groovy.xml.MarkupBuilder
import groovy.xml.XmlSlurper

import java.nio.file.Files
import java.nio.file.Path
import java.util.stream.Stream

class InstrumentationTestReportSplitter {
    private static final XmlSlurper SLURPER = new XmlSlurper(false, false)

    static void split(File moduleDir, File outDir) {
        def resultRoots = [
            'build/browserstack-results',
            'build/outputs/androidTest-results/connected',
            'build/outputs/androidTest-results/managedDevice'
        ].collect {
            new File(moduleDir, it)
        }.findAll { it.directory }

        def casesByClass = [:].withDefault { [] }
        xmlFilesUnder(resultRoots).each { file ->
            def suites = parseSuites(file)
            if (!suites) {
                return
            }
            def resultRoot = resultRoots.find { root ->
                file.canonicalPath.startsWith(root.canonicalPath)
            }
            suites.each { suite ->
                def suiteClass = suiteClassName(suite)
                suite.testcase.each { tc ->
                    def fqcn = tc.@classname?.toString() ?: suiteClass
                    casesByClass[fqcn] << [testcase: tc, sourceXml: file, resultRoot: resultRoot]
                }
            }
        }

        outDir.deleteDir()

        if (casesByClass.isEmpty()) {
            return
        }

        outDir.mkdirs()
        casesByClass.each { fqcn, rows ->
            writeReport(new File(outDir, "TEST-${fqcn.replace('.', '_')}.xml"), fqcn, rows)
        }
    }

    private static List<File> xmlFilesUnder(List<File> roots) {
        roots.collectMany { root ->
            def list = []
            root.eachFileRecurse { f ->
                if (f.file && f.name.endsWith('.xml')) {
                    list << f
                }
            }
            list
        }
    }

    private static List parseSuites(File file) {
        try {
            def root = SLURPER.parse(file)
            switch (root.name()) {
                case 'testsuite':
                    return [root]
                case 'testsuites':
                    return root.children().findAll { it.name() == 'testsuite' }.toList()
                default:
                    return []
            }
        } catch (ignored) {
            return []
        }
    }

    private static String suiteClassName(def suite) {
        def fromCase = suite.testcase.find { it.@classname?.toString() }?.@classname?.toString()
        return fromCase ?: (suite.@name?.toString() ?: 'unknown.UnknownClass')
    }

    private static double parseTime(def tc) {
        try {
            Double.parseDouble(tc.@time?.toString() ?: '0')
        } catch (NumberFormatException ignored) {
            0d
        }
    }

    private static void writeReport(File outFile, String className, List rows) {
        outFile.parentFile.mkdirs()
        def writer = new StringWriter()
        writer << '<?xml version="1.0" encoding="UTF-8"?>\n'
        def mb = new MarkupBuilder(writer)
        mb.setDoubleQuotes(true)
        mb.testsuite(
                name: className,
                tests: rows.size(),
                failures: rows.count { it.testcase.failure.size() > 0 },
                errors: rows.count { it.testcase.error.size() > 0 },
                skipped: rows.count { it.testcase.skipped.size() > 0 },
                time: String.format(Locale.US, '%.3f', rows.sum { parseTime(it.testcase) }),
        ) {
            rows.each { row ->
                def tc = row.testcase
                emitTestCase(mb, tc, row.sourceXml as File, row.resultRoot as File)
            }
        }
        outFile.setText(writer.toString(), 'UTF-8')
    }

    private static List<String> logcatBaseNames(String fqcn, String testName) {
        List<String> names = new ArrayList<>()
        names.add('logcat-' + fqcn + '-' + testName + '.txt')
        String simple = fqcn.contains('.') ? fqcn.substring(fqcn.lastIndexOf('.') + 1) : fqcn
        if (!simple.equals(fqcn)) {
            names.add('logcat-' + simple + '-' + testName + '.txt')
        }
        return names.unique()
    }

    private static File findLogcatFile(File sourceXml, File resultRoot, String fqcn, String testName) {
        if (sourceXml == null || resultRoot == null || !resultRoot.directory) {
            return null
        }
        Set<String> names = new LinkedHashSet<>(logcatBaseNames(fqcn, testName))
        def rootPath = resultRoot.canonicalPath
        File searchBase = sourceXml.parentFile
        while (searchBase != null && searchBase.directory &&
                searchBase.canonicalPath.startsWith(rootPath)) {
            File hit = findFirstMatchingFileNameUnder(searchBase, names, 12)
            if (hit != null) {
                return hit
            }
            searchBase = searchBase.parentFile
        }
        return null
    }

    private static File findFirstMatchingFileNameUnder(File rootDir, Set<String> baseNames, int maxDepth) {
        if (rootDir == null || !rootDir.directory) {
            return null
        }
        Path start = rootDir.toPath()
        try (Stream<Path> stream = Files.walk(start, maxDepth)) {
            return stream
                    .filter { Files.isRegularFile(it) }
                    .filter { baseNames.contains(it.fileName.toString()) }
                    .map { it.toFile() }
                    .findFirst()
                    .orElse(null)
        } catch (IOException ignored) {
            return null
        }
    }

    private static String cdata(String text) {
        '<![CDATA[' + text.replace(']]>', ']]]]><![CDATA[') + ']]>'
    }

    private static void emitTestCase(MarkupBuilder mb, def tc, File sourceXml, File resultRoot) {
        def fqcn = tc.@classname.toString()
        def testName = tc.@name.toString()
        def logcatFile = findLogcatFile(sourceXml, resultRoot, fqcn, testName)
        String logcatText = null
        if (logcatFile != null && logcatFile.isFile()) {
            try {
                logcatText = logcatFile.getText('UTF-8')
            } catch (IOException ignored) {
                logcatText = null
            }
        }
        if (logcatText != null && logcatText.trim().isEmpty()) {
            logcatText = null
        }

        mb.testcase(
                classname: fqcn,
                name: testName,
                time: tc.@time.toString(),
        ) {
            tc.failure.each { f ->
                failure(type: f.@type.toString()) {
                    mkp.yield(f.text().toString())
                }
            }
            tc.error.each { e ->
                error(type: e.@type.toString()) {
                    mkp.yield(e.text().toString())
                }
            }
            if (tc.skipped.size() > 0) {
                skipped()
            }
            tc.'system-out'.each { so ->
                'system-out' {
                    mkp.yield(so.text().toString())
                }
            }
            if (logcatText != null) {
                'system-out' {
                    mkp.yieldUnescaped(cdata(logcatText))
                }
            }
            tc.'system-err'.each { se ->
                'system-err' {
                    mkp.yield(se.text().toString())
                }
            }
        }
    }
}

def modulePath = project.path
def moduleRootPath = project.projectDir.absolutePath
def outputDir =
    project.layout.buildDirectory.dir('instrumentation-test-results')
def taskName = 'splitInstrumentationTestReportsByClass'

project.tasks.register(taskName) { task ->
    task.group = 'verification'
    task.description = 'Splits instrumentation JUnit XML from all devices into per-class reports.'
    task.outputs.dir(outputDir)
    task.doLast {
        InstrumentationTestReportSplitter.split(new File(moduleRootPath), outputDir.get().asFile)
    }
}

if (rootProject.tasks.findByName(taskName) == null) {
    rootProject.tasks.register(taskName) {
        group = 'verification'
        description = "Runs ${taskName} on every Android application/library module."
    }
}

rootProject.tasks.named(taskName).configure {
    dependsOn("${modulePath}:${taskName}")
}
