---
format_version: '25'
default_step_lib_source: 'https://github.com/bitrise-io/bitrise-steplib.git'
project_type: android
trigger_map:
  - push_branch: 'master'
    pipeline: main-trigger-pipeline
  - pull_request_source_branch: '*'
    pipeline: main-trigger-pipeline
app:
  envs:
    - GRADLE_OPTS: -Dkotlin.incremental=false

pipelines:
  main-trigger-pipeline:
    workflows:
      check: { }
      test: { }
      run-instrumentation-tests: { }
      run-paymentsheet-instrumentation-tests: { }
      run-financial-connections-instrumentation-tests: { }
      run-connections-e2e-payments-tests-on-push: { }
      run-connections-e2e-token-tests-on-push: { }
      run-connections-e2e-data-tests-on-push: { }
      run-cardscan-instrumentation-tests: { }
      run-crypto-onramp-example-e2e-tests: { }
      build-paymentsheet-e2e: { }
      run-paymentsheet-e2e:
        parallel: 5
        depends_on:
          - build-paymentsheet-e2e
      check-dependencies: { }
      verify-publish-pom: { }
  pipeline-connect-e2e-debug-tests:
    stages:
      - stage-run-connect-e2e-tests: { }
      # TODO: notify failure
  pipeline-connections-e2e-debug-tests:
    stages:
      - stage-build-connections-debug: { }
      - stage-run-connections-e2e-tests: { }
      - stage-notify-connections-e2e-failure: { }
  pipeline-connections-e2e-release-tests:
    stages:
      - stage-build-connections-release: { }
      - stage-run-connections-e2e-tests: { }
      - stage-notify-connections-e2e-failure: { }
stages:
  stage-run-connect-e2e-tests:
    workflows:
      - run-connect-e2e-tests: { }
  stage-build-connections-debug:
    workflows:
      - build-connections-debug: { }
  stage-build-connections-release:
    workflows:
      - build-connections-release: { }
  stage-run-connections-e2e-tests:
    workflows:
      - run-connections-e2e-payments-tests: { }
      - run-connections-e2e-data-tests: { }
      - run-connections-e2e-token-tests: { }
      - run-connections-e2e-livemode-tests: { }
  stage-notify-connections-e2e-failure:
    should_always_run: true
    workflows:
      - notify-connections-e2e-failure: { }
workflows:
  check:
    before_run:
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          timeout: 1200
          inputs:
            - content: ./gradlew detekt lintRelease apiCheck verifyReleaseResources
  test:
    envs:
      - opts:
          is_expand: false
        NEEDS_ROBOLECTRIC: true
      - INCLUDE_PAPARAZZI_ON_FAILURE: true
    meta:
      bitrise.io:
        stack: osx-xcode-26.5.x    # Specify Mac stack just for this workflow
        machine_type_id: g2.mac.4large # Appropriate Mac instance
    before_run:
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          timeout: 1200
          inputs:
            - content: ./gradlew runUnitAndScreenshotTests --init-script build-configuration/unit-test-init.gradle --continue
      - bundle::export_unit_test_results:
          title: Export unit & screenshot test results
          inputs:
            - test_title: Unit & screenshot tests
  build-connect-debug:
    envs:
      - BUILD_VARIANT: debug
    before_run:
      - _build-connect
  _build-connect:
    before_run:
      - prepare_all
    steps:
      - android-build@1:
          inputs:
            - module: connect-example
            - variant: $BUILD_VARIANT
            - build_type: apk
      - deploy-to-bitrise-io@2:
          inputs:
            - pipeline_intermediate_files: "$BITRISE_APK_PATH:BITRISE_APK_PATH"
  build-connections-debug:
    envs:
      - BUILD_VARIANT: debug
    before_run:
      - _build-connections
  build-connections-release:
    envs:
      - BUILD_VARIANT: release
    before_run:
      - _build-connections
  _build-connections:
    before_run:
      - prepare_all
    steps:
      - android-build@1:
          inputs:
            - arguments: -PSTRIPE_FINANCIAL_CONNECTIONS_EXAMPLE_BACKEND_URL=$STRIPE_FINANCIAL_CONNECTIONS_EXAMPLE_BACKEND_URL
            - module: financial-connections-example
            - variant: $BUILD_VARIANT
            - build_type: apk
      - deploy-to-bitrise-io@2:
          inputs:
            - pipeline_intermediate_files: "$BITRISE_APK_PATH:BITRISE_APK_PATH"
  run-connect-e2e-tests:
    envs:
      - MAESTRO_TAGS: all
    before_run:
      - _run-connect-e2e-tests
  run-connections-e2e-payments-tests:
    envs:
      - MAESTRO_TAGS: testmode-payments
    before_run:
      - _run-connections-e2e-tests
  run-connections-e2e-data-tests:
    envs:
      - MAESTRO_TAGS: testmode-data
    before_run:
      - _run-connections-e2e-tests
  run-connections-e2e-token-tests:
    envs:
      - MAESTRO_TAGS: testmode-token
    before_run:
      - _run-connections-e2e-tests
  run-connections-e2e-payments-tests-on-push:
    envs:
      - MAESTRO_TAGS: testmode-payments
      - BUILD_VARIANT: release
    before_run:
      - _build-connections
      - _run-connections-e2e-tests
    meta:
      bitrise.io:
        stack: ubuntu-resolute-26.04-bitrise-2026-android
        machine_type_id: g2.linux.x-large
  run-connections-e2e-data-tests-on-push:
    envs:
      - MAESTRO_TAGS: testmode-data
      - BUILD_VARIANT: release
    before_run:
      - _build-connections
      - _run-connections-e2e-tests
    meta:
      bitrise.io:
        stack: ubuntu-resolute-26.04-bitrise-2026-android
        machine_type_id: g2.linux.x-large
  run-connections-e2e-token-tests-on-push:
    envs:
      - MAESTRO_TAGS: testmode-token
      - BUILD_VARIANT: release
    before_run:
      - _build-connections
      - _run-connections-e2e-tests
    meta:
      bitrise.io:
        stack: ubuntu-resolute-26.04-bitrise-2026-android
        machine_type_id: g2.linux.x-large
  run-connections-e2e-livemode-tests:
    envs:
      - MAESTRO_TAGS: livemode-data
    before_run:
      - _run-connections-e2e-tests
  _run-connect-e2e-tests:
    before_run:
      - build-connect-debug
      - start_connections_emulator
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - wait-for-android-emulator@1:
          inputs:
            - boot_timeout: 600
      - pull-intermediate-files@1:
          inputs:
            - artifact_sources: .*
      - script@1:
          title: Execute Maestro tests
          inputs:
            - content: |-
                #!/usr/bin/env bash
                bash ./scripts/execute_maestro_tests.sh -m connect -t $MAESTRO_TAGS
      - script@1:
          title: Test results
          is_always_run: true
          inputs:
            - content: |-
                #!/usr/bin/env bash
                python3 "$BITRISE_SOURCE_DIR/scripts/merge_maestro_junit_reports.py" --tag "$MAESTRO_TAGS" --module connect
  _run-connections-e2e-tests:
    before_run:
      - start_connections_emulator
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - wait-for-android-emulator@1:
          inputs:
            - boot_timeout: 600
      - pull-intermediate-files@1:
          inputs:
            - artifact_sources: .*
      - script@1:
          title: Start logcat capture
          inputs:
            - content: |-
                #!/usr/bin/env bash
                adb logcat > /tmp/logcat.txt 2>&1 &
                echo $! > /tmp/logcat.pid
      - script@1:
          title: Execute Maestro tests
          inputs:
            - content: |-
                #!/usr/bin/env bash
                bash ./scripts/execute_maestro_tests.sh -m financial-connections -t $MAESTRO_TAGS
      - script@1:
          title: Stop logcat capture
          is_always_run: true
          is_skippable: true
          inputs:
            - content: |-
                #!/usr/bin/env bash
                kill "$(cat /tmp/logcat.pid)" 2>/dev/null || true
      - deploy-to-bitrise-io@2:
          title: Upload logcat on failure
          run_if: '{{ getenv "BITRISE_BUILD_STATUS" | eq "1" }}'
          inputs:
            - deploy_path: /tmp/logcat.txt
            - notify_user_groups: none
            - is_enable_public_page: "false"
      - script@1:
          title: Test results
          is_always_run: true
          inputs:
            - content: |-
                #!/usr/bin/env bash
                python3 "$BITRISE_SOURCE_DIR/scripts/merge_maestro_junit_reports.py" --tag "$MAESTRO_TAGS" --module financial-connections
  notify-connections-e2e-failure:
    steps:
      # Notify all executions.
      - slack@4:
          inputs:
            - webhook_url: $WEBHOOK_SLACK_CONNECTIONS_MOBILE
            - webhook_url_on_error: $WEBHOOK_SLACK_CONNECTIONS_MOBILE
      # Notify failures.
      - slack@4:
          run_if: '{{ getenv "BITRISEIO_PIPELINE_BUILD_STATUS" | eq "failed" }}'
          inputs:
            - webhook_url: $WEBHOOK_SLACK_CUX_BOTS
            - webhook_url_on_error: $WEBHOOK_SLACK_CUX_BOTS
  run-instrumentation-tests:
    before_run:
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          title: Execute instrumentation tests
          timeout: 1200
          inputs:
            - content: ./scripts/retry_with_emulator_cleanup.sh 3 ./gradlew -Pandroid.experimental.androidTest.numManagedDeviceShards=1 pixel2api33DebugAndroidTest -x :paymentsheet-example:pixel2api33BaseDebugAndroidTest -x :paymentsheet:pixel2api33DebugAndroidTest -x :example:pixel2api33DebugAndroidTest -x :financial-connections:pixel2api33DebugAndroidTest -x :financial-connections-example:pixel2api33DebugAndroidTest -x :camera-core:pixel2api33DebugAndroidTest -x :crypto-onramp-example:pixel2api33DebugAndroidTest -x :stripecardscan:pixel2api33DebugAndroidTest -x :stripecardscan-example:pixel2api33DebugAndroidTest --init-script build-configuration/instrumentation-test-init.gradle
      - bundle::export_instrumentation_test_results:
          title: Export instrumentation test results
          inputs:
            - test_title: Instrumentation tests
  run-paymentsheet-instrumentation-tests:
    before_run:
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          title: Execute instrumentation tests
          timeout: 1200
          inputs:
            - content: ./scripts/retry_with_emulator_cleanup.sh 3 ./gradlew -Pandroid.experimental.androidTest.numManagedDeviceShards=6 -Pandroid.experimental.testOptions.managedDevices.maxConcurrentDevices=6 :paymentsheet:pixel2api33DebugAndroidTest --init-script build-configuration/instrumentation-test-init.gradle
      - bundle::export_instrumentation_test_results:
          title: Export PaymentSheet instrumentation test results
          inputs:
            - test_title: PaymentSheet instrumentation tests
    meta:
      bitrise.io:
        stack: ubuntu-resolute-26.04-bitrise-2026-android
        machine_type_id: g2.linux.x-large
  run-financial-connections-instrumentation-tests:
    before_run:
      - start_emulator
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          title: Assemble Instrumentation tests
          timeout: 600
          inputs:
            - content: ./gradlew :financial-connections:assembleAndroidTest :financial-connections-example:assembleAndroidTest
      - wait-for-android-emulator@1:
          inputs:
            - boot_timeout: 600
      - script@1:
          title: Execute instrumentation tests
          timeout: 1200
          inputs:
            - content: ./scripts/retry_with_emulator_cleanup.sh 3 ./gradlew :financial-connections:connectedAndroidTest :financial-connections-example:connectedAndroidTest --init-script build-configuration/instrumentation-test-init.gradle
      - bundle::export_instrumentation_test_results:
          title: Export FC instrumentation test results
          inputs:
            - test_title: FC instrumentation tests
  run-cardscan-instrumentation-tests:
    before_run:
      - start_cardscan_emulator
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          title: Assemble Instrumentation tests
          timeout: 600
          inputs:
            - content: ./gradlew :camera-core:assembleAndroidTest :stripecardscan:assembleAndroidTest :stripecardscan-example:assembleAndroidTest
      - wait-for-android-emulator@1:
          inputs:
            - boot_timeout: 600
      - script@1:
          title: Execute instrumentation tests
          timeout: 1200
          inputs:
            - content: ./scripts/retry_with_emulator_cleanup.sh 3 ./gradlew :camera-core:connectedAndroidTest :stripecardscan:connectedAndroidTest :stripecardscan-example:connectedAndroidTest --init-script build-configuration/instrumentation-test-init.gradle
      - bundle::export_instrumentation_test_results:
          title: Export CardScan instrumentation test results
          inputs:
            - test_title: CardScan instrumentation tests
  build-paymentsheet-e2e:
    before_run:
      - prepare_all
    steps:
      - script@1:
          title: Compile PaymentSheet E2E tests
          timeout: 1200
          inputs:
            - content: ./gradlew :paymentsheet-example:assembleBaseDebugAndroidTest
  run-paymentsheet-e2e:
    before_run:
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          title: Execute PaymentSheet E2E tests
          timeout: 2400
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                envman add --key PAYMENTSHEET_E2E_SHARD_DISPLAY --value "$((BITRISE_IO_PARALLEL_INDEX + 1))"
                CLASSES=$(python3 scripts/get_shard_test_classes.py --shard-index "$BITRISE_IO_PARALLEL_INDEX" --num-shards 5)

                ./scripts/retry_with_emulator_cleanup.sh 3 ./gradlew -PSTRIPE_PAYMENTSHEET_EXAMPLE_SENTRY_DSN=$STRIPE_PAYMENTSHEET_EXAMPLE_SENTRY_DSN -Pandroid.experimental.androidTest.numManagedDeviceShards=3 -Pandroid.experimental.testOptions.managedDevices.maxConcurrentDevices=6 "-Pandroid.testInstrumentationRunnerArguments.class=$CLASSES" :paymentsheet-example:pixel2api33BaseDebugAndroidTest --init-script build-configuration/instrumentation-test-init.gradle
      - bundle::export_instrumentation_test_results:
          title: Export PaymentSheet E2E test results
          inputs:
            - test_title: "PaymentSheet E2E tests (shard $PAYMENTSHEET_E2E_SHARD_DISPLAY)"
    meta:
      bitrise.io:
        stack: ubuntu-resolute-26.04-bitrise-2026-android
        machine_type_id: g2.linux.x-large
  run-paymentsheet-latency-synthetics:
    before_run:
      - start_emulator
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          title: Install Ruby via asdf
          inputs:
            - content: asdf install ruby 3.2.4
      - wait-for-android-emulator@1:
          inputs:
            - boot_timeout: 600
      - script@1:
          title: Report PaymentSheet latency synthetics
          timeout: 2400
          inputs:
            - content: ruby scripts/report_latency_synthetics.rb
      - bundle::export_instrumentation_test_results:
          title: Export PaymentSheet latency test results
          inputs:
            - test_title: PaymentSheet latency synthetics
    meta:
      bitrise.io:
        stack: ubuntu-resolute-26.04-bitrise-2026-android
        machine_type_id: g2.linux.x-large
  run-crypto-onramp-example-e2e-tests:
    before_run:
      - start_emulator
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          timeout: 1200
          inputs:
            - content: ./scripts/retry.sh 3 ./gradlew :crypto-onramp-example:assembleDebug :crypto-onramp-example:assembleDebugAndroidTest
      - wait-for-android-emulator@1:
          inputs:
            - boot_timeout: 600
      - script@1:
          title: Run Crypto Onramp Example E2E Tests
          timeout: 1200
          inputs:
            - content: ./scripts/retry_with_emulator_cleanup.sh 3 ./gradlew :crypto-onramp-example:connectedDebugAndroidTest --init-script build-configuration/instrumentation-test-init.gradle
      - bundle::export_instrumentation_test_results:
          title: Export Crypto Onramp Example E2E test results
          inputs:
            - test_title: Crypto Onramp E2E tests
  check-dependencies:
    envs:
      - INCLUDE_DEPENDENCIES_ON_FAILURE: true
    before_run:
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          inputs:
            - content: asdf install ruby 3.2.4
      - script@1:
          inputs:
            - content: ruby scripts/dependencies/update_transitive_dependencies.rb
      - script@1:
          inputs:
            - content: ruby scripts/dependencies/check_transitive_dependencies.rb
  verify-publish-pom:
    before_run:
      - prepare_all
    after_run:
      - conclude_all
    steps:
      - script@1:
          title: Verify Maven publish POMs
          timeout: 1800
          inputs:
            - content: bash ./scripts/verify_publish_pom.sh
  start_connections_emulator:
    steps:
      - avd-manager@2:
          inputs:
            - profile: "pixel_6"
            - abi: "x86_64"
            - api_level: 33
            - tag: "google_apis"
            - start_command_flags: >
                -camera-back none
                -camera-front none
                -netdelay none
                -netspeed full
                -memory 4096
                -no-snapshot
                -no-audio
                -no-window
                -gpu swiftshader_indirect
  start_cardscan_emulator:
    steps:
      - avd-manager@2:
          inputs:
            - profile: "pixel_6"
            - abi: "x86_64"
            - api_level: 33
            - tag: "google_apis_playstore"
            - start_command_flags: >
               -camera-back none
               -camera-front none
               -netdelay none
               -netspeed full
               -memory 4096
               -no-snapshot
               -no-audio
               -no-window
  start_emulator:
    steps:
      - avd-manager@2:
          inputs:
            - profile: "pixel_6"
            - abi: "x86_64"
            - api_level: 33
            - tag: "google_apis"
            - start_command_flags: >
               -camera-back none
               -camera-front none
               -netdelay none
               -netspeed full
               -memory 4096
               -no-snapshot
               -no-audio
               -no-window
  start_screenshot_emulator:
    steps:
      - avd-manager@2:
          inputs:
            - profile: "Nexus 6"
            - abi: "x86_64"
            - api_level: 28
            - start_command_flags: >
                -camera-back none
                -camera-front none
                -netdelay none
                -netspeed full
                -memory 2048
                -no-snapshot
                -no-audio
                -no-window
                -no-snapshot-save
                -gpu swiftshader_indirect
                -no-boot-anim
  prepare_all:
    steps:
      - activate-ssh-key@4:
          run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
      - git-clone@8: { }
      - script@1:
          title: Install Java via Direct Download
          inputs:
            - content: ./scripts/retry.sh 3 ./scripts/install_java.sh
      - restore-gradle-configuration-cache@1: { }
      - restore-gradle-cache@2: { }
      - script@1:
          inputs:
            - content: mkdir -p ~/.gradle ; cp .bitrise/ci-gradle.properties ~/.gradle/gradle.properties
      - script@1:
          inputs:
            - content: echo "STRIPE_EXAMPLE_BACKEND_URL=$STRIPE_EXAMPLE_BACKEND_URL" >> ~/.gradle/gradle.properties; echo "STRIPE_EXAMPLE_PUBLISHABLE_KEY=$STRIPE_EXAMPLE_PUBLISHABLE_KEY" >> ~/.gradle/gradle.properties
      - activate-build-cache-for-gradle:
          inputs:
            - push: 'true'
            - validation_level: warning
  conclude_all:
    steps:
      - script-runner@0:
          is_always_run: true
          title: Copy test results to tmp
          inputs:
            - file_path: ./scripts/copy_test_results_to_tmp.sh
      - deploy-to-bitrise-io@2:
          inputs:
            - notify_user_groups: none
            - is_compress: "true"
            - deploy_path: /tmp/test_results
            - is_enable_public_page: "false"
          title: Deploy test results artifacts
      - save-gradle-configuration-cache@1: { }
      - save-gradle-cache@1:
          inputs:
            - save_transforms: true
step_bundles:
  export_unit_test_results:
    inputs:
      - test_title: Unit tests
    steps:
      - bundle::export_test_results:
          inputs:
            - test_title: $test_title
            - test_type: unit
  export_instrumentation_test_results:
    inputs:
      - test_title: Instrumentation tests
    steps:
      - script@1:
          title: Split instrumentation test results
          is_skippable: true
          is_always_run: true
          timeout: 1200
          inputs:
            - content: ./gradlew splitInstrumentationTestReportsByClass
      - bundle::export_test_results:
          inputs:
            - test_title: $test_title
            - test_type: instrumentation
  export_test_results:
    inputs:
      - test_title: tests
      - test_type: unit
    steps:
      - script@1:
          is_always_run: true
          is_skippable: true
          title: Test results
          inputs:
            - content: |
                #!/usr/bin/env bash
                bash "$BITRISE_SOURCE_DIR/scripts/store_in_bitrise_test_results_folder.sh" "$test_type" "$test_title"
meta:
  bitrise.io:
    stack: ubuntu-resolute-26.04-bitrise-2026-android
    machine_type_id: g2.linux.medium
