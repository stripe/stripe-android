appId: com.stripe.android.financialconnections.example
tags:
  - all
  - edge
  - testmode-payments
---
- startRecording: ${'/tmp/test_results/testmode-paymentintent-testinstitution-networking-' + new Date().getTime()}
- clearState
- openLink: stripeconnectionsexample://playground?integration_type=Standalone&experience=FinancialConnections&flow=PaymentIntent&financial_connections_override_native=native&financial_connections_test_mode=true&merchant=testmode&permissions=payment_method
- scrollUntilVisible:
    element:
      id: "connect_accounts"
    timeout: 30000
- tapOn:
    id: "connect_accounts"
# Wait until the consent button is visible
- extendedWaitUntil:
    visible:
      id: "consent_cta"
    timeout: 30000
- tapOn:
    id: "consent_cta"
# Select Down institution
- extendedWaitUntil:
    visible: "Search"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Down (Unscheduled)"
    timeout: 30000
- tapOn: "Down (Unscheduled)"
# Selecting another bank resets the flow
- extendedWaitUntil:
    visible: "Select another bank"
    timeout: 30000
- tapOn: "Select another bank"
# The picker may reopen at the top of the list or stay near the prior position.
- extendedWaitUntil:
    visible: "Search"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Down (Unscheduled)"
    timeout: 30000
- tapOn: "Down (Unscheduled)"
# Close flow from error page
- extendedWaitUntil:
    visible: "Close icon"
    timeout: 30000
- tapOn: "Close icon"
- scrollUntilVisible:
    element:
      text: "Failed! Request-id: .*"
- stopRecording
