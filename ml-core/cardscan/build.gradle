apply from: configs.androidLibrary

android {
    buildFeatures {
        buildConfig = false
    }
}

dependencies {
    api project(':ml-core:base')
    implementation libs.tensorflowLitePlayServices
    api libs.tensorflowLitePlayServicesSupport
    implementation libs.androidx.annotation
}

ext {
    artifactId = "ml-core-cardscan"
    artifactName = "ml-core-cardscan"
    artifactDescrption = "the machine learning module with cardscan specific LiteRT Play Services runtime"
}

apply from: "${rootDir}/deploy/deploy.gradle"
